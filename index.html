<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ConnectMe – Firebase RealTime</title>
</head>
<body>

<h2>🔥 ConnectMe con Firebase (Base funcional)</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="pass" placeholder="Password"><br><br>
<button onclick="register()">Registrarse</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<hr>

<input type="file" id="img">
<button onclick="uploadImage()">Subir Imagen</button>

<hr>

<textarea id="postText" placeholder="Escribe algo..."></textarea>
<button onclick="createPost()">Publicar</button>

<div id="posts"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
  storageBucket: "TU_PROYECTO.appspot.com",
  messagingSenderId: "XXX",
  appId: "XXX"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// REGISTER
function register(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  auth.createUserWithEmailAndPassword(email, pass)
  .then(()=>alert('Registrado'))
  .catch(e=>alert(e.message));
}

// LOGIN
function login(){
  const email = document.getElementById('email').value;
  const pass = document.getElementById('pass').value;
  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>alert('Logeado'))
  .catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
  auth.signOut();
}

// SUBIR IMAGEN
let imageURL = "";
async function uploadImage(){
  const file = document.getElementById('img').files[0];
  const ref = storage.ref('posts/' + Date.now());
  await ref.put(file);
  imageURL = await ref.getDownloadURL();
  alert('Imagen subida');
}

// CREAR POST
function createPost(){
  const text = document.getElementById('postText').value;
  db.collection('posts').add({
    text,
    image: imageURL,
    user: auth.currentUser.email,
    time: Date.now()
  });
}

// TIEMPO REAL
 db.collection('posts').orderBy('time','desc')
 .onSnapshot(snapshot=>{
   document.getElementById('posts').innerHTML = "";
   snapshot.forEach(doc=>{
     const p = doc.data();
     document.getElementById('posts').innerHTML += `
       <div style="border:1px solid #ccc;margin:10px;padding:10px">
         <b>${p.user}</b><br>
         ${p.text}<br>
         ${p.image ? `<img src="${p.image}" width="200">` : ""}
       </div>
     `;
   });
 });

</script>

</body>
</html>
